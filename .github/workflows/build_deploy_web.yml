name: Build and Deploy Web (Development)

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "packages/shared/**"
      - "deploy/charts/open-inspect-web/**"
      - ".helmfile/**"
      - ".github/workflows/build_deploy_web.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  HELMFILE_ENV: development

jobs:
  check-config:
    name: Check Deployment Config
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Validate required secrets
        id: check
        run: |
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}" ] || \
             [ -z "${{ secrets.AWS_REGION }}" ] || \
             [ -z "${{ secrets.EKS_CLUSTER_NAME_DEV }}" ] || \
             [ -z "${{ secrets.ECR_REPOSITORY }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping dev deployment - missing one of AWS_ROLE_TO_ASSUME, AWS_REGION, EKS_CLUSTER_NAME_DEV, or ECR_REPOSITORY"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy-dev:
    name: Build and Deploy to Development
    runs-on: ubuntu-latest
    needs: [check-config]
    if: needs.check-config.outputs.configured == 'true'
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-duration-seconds: 3600
          role-session-name: open-inspect-web-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest-dev
          provenance: false

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Helmfile
        run: |
          HELMFILE_VERSION=v0.169.1
          curl -fsSL -o helmfile.tar.gz "https://github.com/helmfile/helmfile/releases/download/${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION#v}_linux_amd64.tar.gz"
          tar -xzf helmfile.tar.gz
          sudo mv helmfile /usr/local/bin/helmfile
          helmfile --version

      - name: Configure kubeconfig for development cluster
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME_DEV }}"

      - name: Helmfile diff (development)
        working-directory: .helmfile
        run: |
          helmfile \
            --environment "${{ env.HELMFILE_ENV }}" \
            --state-values-set version="${{ steps.image.outputs.tag }}" \
            -l app=open-inspect-web diff

      - name: Helmfile apply (development)
        working-directory: .helmfile
        run: |
          helmfile \
            --environment "${{ env.HELMFILE_ENV }}" \
            --state-values-set version="${{ steps.image.outputs.tag }}" \
            -l app=open-inspect-web apply
